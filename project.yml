# XcodeGen project definition.
# Run `xcodegen generate` in this directory (install via `brew install xcodegen`)
# to produce Wearly.xcodeproj from the Swift sources.

name: Wearly
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""          # <-- fill in your Apple Developer Team ID
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait

targets:
  Wearly:
    type: application
    platform: iOS
    sources:
      - path: Wearly
        excludes:
          - "Info.plist"
    resources:
      - Wearly/Assets.xcassets
    info:
      path: Wearly/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.Wearly
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1"     # iPhone only
    dependencies:
      - sdk: CoreLocation.framework
      - sdk: UserNotifications.framework
